<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Age — Digital Systems & Architecture</title>
<meta name="description" content="Golden Age — a digital ecosystem uniting fintech, investments, AI, blockchain, education and analytics. Full-cycle development: from idea and architecture to launch and scaling. Baku, Azerbaijan.">
<meta name="keywords" content="fintech, blockchain, Solana, Web3, AI, SaaS, system architecture, full-stack development, Baku, Azerbaijan">
<meta property="og:type" content="website">
<meta property="og:title" content="Golden Age — Digital Systems & Architecture">
<meta property="og:description" content="Fintech · Investments · AI · Blockchain · Education · Analytics. Full-cycle digital products: from idea to launch and scaling.">
<meta property="og:site_name" content="Golden Age">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Golden Age — Digital Systems & Architecture">
<meta name="twitter:description" content="Fintech · Investments · AI · Blockchain · Education · Analytics. Full-cycle digital products.">
<meta name="theme-color" content="#080C16">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23080C16'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23D9AC4E' stroke-width='1.6'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23D9AC4E'/%3E%3Cpath d='M16 5v6M16 21v6M5 16h6M21 16h6' stroke='%23D9AC4E' stroke-width='1.3'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#080C16;
  --panel:#0E1424;
  --panel-2:#121A2E;
  --gold:#D9AC4E;
  --gold-hi:#F0D08A;
  --gold-lo:#9C7426;
  --text:#EAE7DE;
  --muted:#8E97AC;
  --line:rgba(217,172,78,.16);
  --line-soft:rgba(217,172,78,.08);
  --header-bg:rgba(8,12,22,.82);
  --clink-bg:rgba(8,12,22,.5);
  --radius:14px;
}
html[data-theme="light"]{
  --ink:#FAF8F3;
  --panel:#FFFFFF;
  --panel-2:#F3EFE5;
  --gold:#A87B22;
  --gold-hi:#C89A3E;
  --gold-lo:#7C5A16;
  --text:#1C202B;
  --muted:#5C6272;
  --line:rgba(140,100,30,.28);
  --line-soft:rgba(140,100,30,.13);
  --header-bg:rgba(250,248,243,.85);
  --clink-bg:rgba(255,255,255,.7);
}
html{background:var(--ink)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--ink);
  color:var(--text);
  transition:background .35s ease,color .35s ease;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:16px;line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(var(--line-soft) 1px,transparent 1px),
    linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,black 0%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 90% 60% at 50% 0%,black 0%,transparent 75%);
}
h1,h2,h3,.display{font-family:'Unbounded','Inter',sans-serif}
a{color:inherit;text-decoration:none}
::selection{background:rgba(217,172,78,.35)}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--panel-2);border-radius:99px;border:2px solid var(--ink)}
::-webkit-scrollbar-thumb:hover{background:var(--gold-lo)}
#progress{position:fixed;top:0;left:0;height:2px;width:0;z-index:100;
  background:linear-gradient(90deg,var(--gold-hi),var(--gold));
  box-shadow:0 0 8px rgba(217,172,78,.6)}
/* rotating focus word */
.rot-line{margin-top:18px;font-size:.86rem;color:var(--muted);display:flex;align-items:center;gap:10px}
.rotator{
  font-family:'Unbounded';font-size:.8rem;font-weight:500;color:var(--gold);
  display:inline-block;min-width:150px;transition:opacity .35s,transform .35s;
}
.rotator.out{opacity:0;transform:translateY(6px)}
/* tech ribbon */
.ribbon{
  border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
  padding:16px 0;overflow:hidden;position:relative;
  mask-image:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,black 8%,black 92%,transparent);
}
.ribbon-track{display:flex;width:max-content;animation:scrollx 38s linear infinite}
.ribbon:hover .ribbon-track{animation-play-state:paused}
@keyframes scrollx{to{transform:translateX(-50%)}}
.ribbon span{
  font:600 .7rem 'Unbounded';letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;padding-right:22px;
}
.ribbon span::after{content:"◆";color:var(--gold);opacity:.6;font-size:.45rem;margin-left:22px;vertical-align:2px}
/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:56px}
.stat{
  border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:22px 20px;text-align:center;
  background:linear-gradient(160deg,var(--panel),transparent);
}
.stat b{
  display:block;font:600 1.7rem 'Unbounded';margin-bottom:6px;
  background:linear-gradient(100deg,var(--gold-hi),var(--gold) 60%,var(--gold-lo));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.stat span{font-size:.78rem;color:var(--muted);line-height:1.4;display:block}
/* back to top */
#toTop{
  position:fixed;bottom:26px;right:26px;z-index:60;
  width:44px;height:44px;border-radius:50%;cursor:pointer;
  border:1px solid var(--line);background:var(--panel);color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transform:translateY(10px);
  transition:opacity .3s,transform .3s,border-color .2s;
  box-shadow:0 6px 24px rgba(0,0,0,.3);
}
#toTop.show{opacity:1;pointer-events:auto;transform:none}
#toTop:hover{border-color:var(--gold)}
@media (max-width:960px){.stats{grid-template-columns:repeat(2,1fr)}}

.wrap{max-width:1180px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:var(--header-bg);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line-soft);
}
.nav{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Unbounded';font-weight:600;font-size:.95rem;letter-spacing:.12em}
.logo-mark{width:30px;height:30px;flex:none}
.nav-links{display:flex;gap:28px;font-size:.85rem;color:var(--muted)}
.nav-links a{transition:color .2s}
.nav-links a:hover,.nav-links a:focus-visible{color:var(--gold-hi)}
.lang{display:flex;gap:2px;border:1px solid var(--line);border-radius:99px;padding:3px}
.lang button{
  background:none;border:0;color:var(--muted);font:600 .74rem 'Inter';
  padding:5px 11px;border-radius:99px;cursor:pointer;letter-spacing:.06em;transition:.2s;
}
.lang button:hover{color:var(--text)}
.lang button.on{background:var(--gold);color:#1A1206}
.burger{display:none;background:none;border:1px solid var(--line);border-radius:8px;color:var(--gold);width:38px;height:38px;font-size:1.1rem;cursor:pointer}
.theme-btn{
  background:none;border:1px solid var(--line);border-radius:99px;
  width:36px;height:36px;cursor:pointer;color:var(--gold);
  display:flex;align-items:center;justify-content:center;flex:none;
  transition:border-color .2s,transform .2s;
}
.theme-btn:hover{border-color:var(--gold);transform:rotate(15deg)}
.theme-btn svg{width:17px;height:17px}
.theme-btn .sun{display:none}
html[data-theme="light"] .theme-btn .sun{display:block}
html[data-theme="light"] .theme-btn .moon{display:none}
/* SVG diagram & logo follow theme (CSS beats presentation attributes) */
.diagram [fill="#0E1424"]{fill:var(--panel)}
.diagram [stroke="#D9AC4E"]{stroke:var(--gold)}
.diagram circle[fill="#D9AC4E"]{fill:var(--gold)}
.logo-mark [stroke="#D9AC4E"]{stroke:var(--gold)}
.logo-mark [fill="#D9AC4E"]{fill:var(--gold)}

/* ---------- hero ---------- */
.hero{padding:88px 0 72px;position:relative}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font:600 .72rem 'Inter';letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:22px;
}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.hero h1{
  font-size:clamp(1.7rem,3.6vw,2.9rem);font-weight:600;line-height:1.18;
  letter-spacing:-.01em;margin-bottom:22px;
}
.hero h1 .g{
  background:linear-gradient(100deg,var(--gold-hi),var(--gold) 45%,var(--gold-lo) 70%,var(--gold-hi));
  background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shimmer 7s linear infinite;
}
@keyframes shimmer{to{background-position:-220% center}}
.hero p{color:var(--muted);max-width:52ch;margin-bottom:32px;font-size:1.02rem}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:9px;
  font:600 .88rem 'Inter';padding:14px 26px;border-radius:10px;
  transition:transform .2s,box-shadow .2s,background .2s;cursor:pointer;border:0;
}
.btn-gold{
  background:linear-gradient(120deg,var(--gold-hi),var(--gold) 60%,var(--gold-lo));
  color:#1A1206;box-shadow:0 6px 26px rgba(217,172,78,.28);
}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(217,172,78,.4)}
.btn-ghost{border:1px solid var(--line);color:var(--text);background:transparent}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold-hi)}
.paid-note{margin-top:20px;font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:8px}
.paid-note .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex:none}

/* hero diagram */
.diagram{position:relative}
.diagram svg{width:100%;height:auto;display:block}
.node-label{font:500 10.5px 'Inter';fill:var(--muted);letter-spacing:.04em}
.node-label.core{fill:var(--gold-hi);font-family:'Unbounded';font-size:9.5px;letter-spacing:.14em}
@keyframes dashflow{to{stroke-dashoffset:-120}}
.flow{stroke:var(--gold);stroke-opacity:.5;stroke-width:1;fill:none;stroke-dasharray:3 9;animation:dashflow 6s linear infinite}
.wire{stroke:var(--line);stroke-width:1;fill:none}
@keyframes corePulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.08;transform:scale(1.25)}}
.core-glow{transform-origin:center;transform-box:fill-box;animation:corePulse 4s ease-in-out infinite}

/* ecosystem */
.eco{background:linear-gradient(180deg,transparent,rgba(217,172,78,.035),transparent)}
.eco-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.eco-card{
  background:linear-gradient(160deg,var(--panel),var(--panel-2));
  border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:26px 24px;position:relative;overflow:hidden;
  transition:border-color .25s,transform .25s;
}
.eco-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold-hi),var(--gold-lo));
  opacity:.55;
}
.eco-card:hover{border-color:var(--line);transform:translateY(-3px)}
.eco-card .tag{
  font:600 .62rem 'Unbounded';letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);display:block;margin-bottom:12px;
}
.eco-card h3{font-size:.95rem;font-weight:500;margin-bottom:8px}
.eco-card p{font-size:.85rem;color:var(--muted)}
@media (max-width:960px){.eco-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){.eco-grid{grid-template-columns:1fr}}

/* ---------- sections ---------- */
section{padding:78px 0}
.sec-head{margin-bottom:46px;max-width:640px}
.sec-head h2{font-size:clamp(1.25rem,2.4vw,1.8rem);font-weight:600;margin:14px 0 12px;line-height:1.3}
.sec-head p{color:var(--muted)}

/* services */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{
  background:linear-gradient(160deg,var(--panel),var(--panel-2));
  border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:26px 24px;transition:border-color .25s,transform .25s;
}
.card:hover{border-color:var(--line);transform:translateY(-3px)}
.card .ic{
  width:38px;height:38px;border-radius:10px;margin-bottom:16px;
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
  color:var(--gold);
}
.card h3{font-size:.92rem;font-weight:500;margin-bottom:8px;line-height:1.35}
.card p{font-size:.85rem;color:var(--muted)}

/* process */
.process{background:linear-gradient(180deg,transparent,rgba(217,172,78,.03),transparent)}
.pipe{display:grid;grid-template-columns:repeat(6,1fr);gap:0;position:relative;margin-top:8px}
.pipe::before{
  content:"";position:absolute;top:19px;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;
}
.step{text-align:center;padding:0 8px;position:relative}
.step .n{
  width:38px;height:38px;margin:0 auto 14px;border-radius:50%;
  border:1px solid var(--gold);background:var(--ink);color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font:600 .78rem 'Unbounded';position:relative;z-index:1;
}
.step h3{font-size:.82rem;font-weight:500;margin-bottom:6px}
.step p{font-size:.76rem;color:var(--muted);line-height:1.5}

/* stack */
.stack-groups{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.sg{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);padding:24px}
.sg h3{font-size:.72rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  font:500 .78rem 'Inter';color:var(--text);
  border:1px solid var(--line-soft);border-radius:99px;padding:6px 13px;
  transition:border-color .2s,color .2s;
}
.chip:hover{border-color:var(--gold);color:var(--gold-hi)}

/* business */
.biz{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.biz .card{display:flex;gap:18px;align-items:flex-start}
.biz .card .ic{flex:none;margin:2px 0 0}

/* formats */
.formats{display:flex;flex-wrap:wrap;gap:10px}
.fmt{
  border:1px solid var(--line);border-radius:99px;padding:10px 20px;
  font-size:.85rem;color:var(--text);background:rgba(217,172,78,.04);
}

/* contact */
.contact-box{
  background:linear-gradient(140deg,var(--panel-2),var(--panel));
  border:1px solid var(--line);border-radius:20px;
  padding:56px 48px;display:grid;grid-template-columns:1.2fr .8fr;gap:40px;align-items:center;
  position:relative;overflow:hidden;
}
.contact-box::after{
  content:"";position:absolute;right:-120px;top:-120px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(217,172,78,.14),transparent 70%);pointer-events:none;
}
.contact-box h2{font-size:clamp(1.2rem,2.2vw,1.7rem);font-weight:600;margin-bottom:14px;line-height:1.3}
.contact-box p{color:var(--muted);margin-bottom:0}
.contact-links{display:flex;flex-direction:column;gap:12px}
.clink{
  display:flex;align-items:center;gap:14px;border:1px solid var(--line-soft);
  border-radius:12px;padding:15px 18px;background:var(--clink-bg);
  transition:border-color .2s,transform .2s;font-size:.9rem;
}
.clink:hover{border-color:var(--gold);transform:translateX(4px)}
.clink .ic{color:var(--gold);flex:none;display:flex}
.clink small{display:block;color:var(--muted);font-size:.74rem}

footer{border-top:1px solid var(--line-soft);padding:34px 0;color:var(--muted);font-size:.8rem}
.foot{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center}

/* reveal */
.rv{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
.rv.in{opacity:1;transform:none}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .rv{opacity:1;transform:none}
  html{scroll-behavior:auto}
}
@media (max-width:960px){
  .hero-grid{grid-template-columns:1fr}
  .diagram{max-width:520px;margin:0 auto}
  .cards{grid-template-columns:repeat(2,1fr)}
  .pipe{grid-template-columns:repeat(3,1fr);row-gap:34px}
  .pipe::before{display:none}
  .stack-groups,.biz{grid-template-columns:1fr}
  .contact-box{grid-template-columns:1fr;padding:40px 28px}
  .nav-links{
    display:none;position:absolute;top:68px;left:0;right:0;
    background:var(--ink);border-bottom:1px solid var(--line-soft);
    flex-direction:column;gap:0;padding:10px 24px 18px;
  }
  .nav-links.open{display:flex}
  .nav-links a{padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .burger{display:block}
}
@media (max-width:560px){
  .cards{grid-template-columns:1fr}
  .pipe{grid-template-columns:repeat(2,1fr)}
  .hero{padding:56px 0 48px}
  section{padding:56px 0}
}
</style>
</head>
<body>
<div id="progress"></div>
<button id="toTop" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<header>
  <div class="wrap nav">
    <a href="#top" class="logo" aria-label="Golden Age">
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <circle cx="16" cy="16" r="14.5" stroke="#D9AC4E" stroke-width="1.4"/>
        <circle cx="16" cy="16" r="3.2" fill="#D9AC4E"/>
        <path d="M16 4v6M16 22v6M4 16h6M22 16h6" stroke="#D9AC4E" stroke-width="1.2"/>
      </svg>
      GOLDEN&nbsp;AGE
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="#ecosystem" data-i18n="nav_eco"></a>
      <a href="#services" data-i18n="nav_services"></a>
      <a href="#process" data-i18n="nav_process"></a>
      <a href="#stack" data-i18n="nav_stack"></a>
      <a href="#business" data-i18n="nav_business"></a>
      <a href="#contact" data-i18n="nav_contact"></a>
    </nav>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="theme-btn" id="themeBtn" aria-label="Theme">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 13A9 9 0 1111 3a7 7 0 0010 10z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/></svg>
      </button>
      <div class="lang" role="group" aria-label="Language">
        <button data-lang="az" class="on">AZ</button>
        <button data-lang="ru">RU</button>
        <button data-lang="en">EN</button>
      </div>
      <button class="burger" id="burger" aria-label="Menu">☰</button>
    </div>
  </div>
</header>

<main id="top">

<!-- HERO -->
<section class="hero">
  <div class="wrap hero-grid">
    <div>
      <span class="eyebrow" data-i18n="hero_eyebrow"></span>
      <h1><span data-i18n="hero_h1a"></span> <span class="g" data-i18n="hero_h1b"></span></h1>
      <p data-i18n="hero_p"></p>
      <div class="cta-row">
        <a href="#contact" class="btn btn-gold" data-i18n="hero_cta1"></a>
        <a href="#services" class="btn btn-ghost" data-i18n="hero_cta2"></a>
      </div>
      <div class="paid-note"><span class="dot"></span><span data-i18n="paid_note"></span></div>
      <div class="rot-line"><span data-i18n="rot_label"></span><span class="rotator" id="rotator">Fintech</span></div>
    </div>

    <div class="diagram" aria-hidden="true">
      <svg viewBox="0 0 520 440" xmlns="http://www.w3.org/2000/svg">
        <!-- wires -->
        <path class="wire" d="M260 220 L120 90"/>
        <path class="wire" d="M260 220 L400 90"/>
        <path class="wire" d="M260 220 L70 230"/>
        <path class="wire" d="M260 220 L450 230"/>
        <path class="wire" d="M260 220 L130 360"/>
        <path class="wire" d="M260 220 L390 360"/>
        <path class="wire" d="M120 90 L400 90"/>
        <path class="wire" d="M70 230 L130 360"/>
        <path class="wire" d="M450 230 L390 360"/>

let LANG = "az";

function render(){
  const t = T[LANG];
  document.documentElement.lang = LANG;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(t[k]) el.textContent = t[k];
  });
  /* stats */
  document.getElementById("stats").innerHTML = t.stats.map(s=>`
    <div class="stat"><b>${s[0]}</b><span>${s[1]}</span></div>`).join("");
  /* ecosystem */
  document.getElementById("ecoCards").innerHTML = t.eco_items.map(e=>`
    <div class="eco-card rv in"><span class="tag">${e[0]}</span><h3>${e[1]}</h3><p>${e[2]}</p></div>`).join("");
  /* services */
  document.getElementById("serviceCards").innerHTML = t.services.map((s,i)=>`
    <div class="card rv in"><div class="ic">${ICONS[i]}</div><h3>${s[0]}</h3><p>${s[1]}</p></div>`).join("");
  /* process */
  document.getElementById("pipe").innerHTML = t.steps.map((s,i)=>`
    <div class="step rv in"><div class="n">${String(i+1).padStart(2,"0")}</div><h3>${s[0]}</h3><p>${s[1]}</p></div>`).join("");
  /* stack */
  document.getElementById("stackGroups").innerHTML = STACK.map(g=>`
    <div class="sg rv in"><h3>${g[0]}</h3><div class="chips">${g[1].map(c=>`<span class="chip">${c}</span>`).join("")}</div></div>`).join("");
  /* business */
  document.getElementById("bizCards").innerHTML = t.biz_items.map((b,i)=>`
    <div class="card rv in"><div class="ic">${BIZ_ICONS[i]}</div><div><h3>${b[0]}</h3><p>${b[1]}</p></div></div>`).join("");
  /* formats */
  document.getElementById("formats").innerHTML = t.formats.map(f=>`<span class="fmt">${f}</span>`).join("");
  observeReveals();
}

document.querySelectorAll(".lang button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".lang button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    LANG = b.dataset.lang;
    render();
  });
});

/* theme toggle */
const themeBtn = document.getElementById("themeBtn");
function setTheme(t){
  if(t==="light") document.documentElement.setAttribute("data-theme","light");
  else document.documentElement.removeAttribute("data-theme");
  try{ localStorage.setItem("ga-theme",t); }catch(e){}
}
themeBtn.addEventListener("click",()=>{
  const isLight = document.documentElement.getAttribute("data-theme")==="light";
  setTheme(isLight ? "dark" : "light");
});
try{
  const saved = localStorage.getItem("ga-theme");
  if(saved) setTheme(saved);
}catch(e){}

/* tech ribbon (duplicated for seamless loop) */
const RIBBON = ["Python","TypeScript","React","Next.js","Node.js","Rust","Go","FastAPI","PostgreSQL","Redis","Docker","Kubernetes","Solana","Web3","Smart Contracts","AI / ML","GraphQL","WebSocket"];
document.getElementById("ribbonTrack").innerHTML =
  [...RIBBON,...RIBBON].map(x=>`<span>${x}</span>`).join("");

/* rotating focus word */
const ROT = ["Fintech","Investments","AI Systems","Blockchain","Web3 · Solana","SaaS","Trading Systems","Automation","Analytics"];
let rotI = 0;
const rotEl = document.getElementById("rotator");
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
if(!reduceMotion){
  setInterval(()=>{
    rotEl.classList.add("out");
    setTimeout(()=>{
      rotI = (rotI+1)%ROT.length;
      rotEl.textContent = ROT[rotI];
      rotEl.classList.remove("out");
    },350);
  },2600);
}

/* scroll progress + back to top */
const progress = document.getElementById("progress");
const toTop = document.getElementById("toTop");
window.addEventListener("scroll",()=>{
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  progress.style.width = (max>0 ? (h.scrollTop/max)*100 : 0) + "%";
  toTop.classList.toggle("show", h.scrollTop > 600);
},{passive:true});
toTop.addEventListener("click",()=>window.scrollTo({top:0,behavior:reduceMotion?"auto":"smooth"}));

/* mobile menu */
const burger = document.getElementById("burger");
const navLinks = document.getElementById("navLinks");
burger.addEventListener("click",()=>navLinks.classList.toggle("open"));
navLinks.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>navLinks.classList.remove("open")));

/* scroll reveal */
let io;
function observeReveals(){
  if(io) io.disconnect();
  io = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
  },{threshold:.12});
  document.querySelectorAll(".rv:not(.in)").forEach(el=>io.observe(el));
}

document.getElementById("year").textContent = new Date().getFullYear();
render();
